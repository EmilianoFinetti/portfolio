<!DOCTYPE html>
<html lang="en" data-bs-theme="auto" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Emiliano Finetti</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <!-- Theme Toggler Script -->
    <script>
        const updateTheme = () => {
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-bs-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-bs-theme', 'light');
            }
        };
        updateTheme();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateTheme);
    </script>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./assets/css/style.css">
    <!-- i18n Script -->
    <script src="./assets/js/i18n.js" defer></script>
</head>
<body style="font-family: 'Inter', sans-serif;" class="d-flex flex-column min-vh-100">
    <header class="py-4 border-bottom">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0 fw-bold text-dark">Emiliano Finetti</h1>
        </div>
    </header>

    <main class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <div class="text-center">
            <h1 class="display-1 fw-bold text-primary mb-3">404</h1>
            <h2 class="h3 fw-bold text-dark mb-3" data-i18n="404_heading">Oops! Page not found.</h2>
            <p class="fs-5 text-muted-custom mb-5" data-i18n="404_text" style="max-width: 600px; margin: 0 auto;">
                The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
            </p>
            <a href="index.html" class="btn btn-primary rounded-pill px-4 py-2 fw-medium">
                <i class="fas fa-home me-2"></i> <span data-i18n="home_link">Back to Home</span>
            </a>
        </div>
    </main>

    <footer class="py-5 mt-auto text-center text-muted-custom" style="background-color: #f8f9fa; border-top: 1px solid rgba(0,0,0,0.05);">
        <div class="container">
            <p class="mb-0">&copy; 2026 Emiliano Finetti | <span data-i18n="footer_text">Created with passion</span></p>
        </div>
    </footer>
    
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
